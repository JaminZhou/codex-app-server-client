name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    # Public pull requests must never execute untrusted code on a personal self-hosted runner.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          dest: ${{ runner.temp }}/setup-pnpm
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - uses: actions/setup-node@v7
        with:
          node-version: 18
      # pnpm 11 itself requires Node 22; invoke the Node 18 smoke script directly.
      - run: node scripts/package-smoke.mjs

  windows-package-smoke:
    runs-on: windows-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          dest: ${{ runner.temp }}/setup-pnpm
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - uses: actions/setup-node@v7
        with:
          node-version: 18
      # pnpm 11 itself requires Node 22; invoke the Node 18 smoke script directly.
      - run: node scripts/package-smoke.mjs
