name: codex drift

on:
  schedule:
    - cron: "37 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  latest-stable:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          dest: ${{ runner.temp }}/setup-pnpm
      - uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: pnpm install --frozen-lockfile
      - run: pnpm protocol:latest-check
